<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Claim your team — Fanager</title>

  <style>
    :root {
      --bg: #0a1628;
      --panel: rgba(17, 24, 39, 0.82);
      --panel-border: rgba(148, 163, 184, 0.18);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-strong: #2563eb;
      --shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        radial-gradient(circle at top, rgba(59, 130, 246, 0.22), transparent 34%),
        linear-gradient(180deg, #10233c 0%, var(--bg) 42%, #06111f 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .shell {
      width: min(100%, 540px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      padding: 32px 24px;
    }

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #60a5fa 0%, #2563eb 100%);
      box-shadow: 0 20px 45px rgba(37, 99, 235, 0.35);
      padding: 14px;
    }

    .logo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    h1 {
      font-size: clamp(24px, 3.6vw, 30px);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 14px;
    }

    .subtitle {
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 28px;
      max-width: 380px;
    }

    .store-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .store-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 18px;
      padding: 6px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease, background 0.2s ease;
      opacity: 0.92;
    }

    .store-badge:hover {
      transform: translateY(-1px);
      opacity: 1;
    }

    .store-badge img {
      display: block;
      height: 56px;
      width: auto;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .shell {
        padding: 28px 20px;
      }

      .store-buttons {
        flex-direction: column;
        gap: 14px;
      }

      .store-badge img {
        height: 54px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <main class="landing">
      <div class="logo" aria-hidden="true">
        <img src="/images/branding/fanager-mark-white.png" alt="">
      </div>
      <h1>You've been invited to manage a team on Fanager</h1>
      <p class="subtitle">
        Open the Fanager app to claim your team. If you don't have it yet,
        install it from the App Store or Google Play, then tap the link in
        your invitation email again.
      </p>

      <div class="store-buttons">
        <a class="store-badge" href="https://apps.apple.com/app/fanager/id6759442301">
          <img src="/images/badges/app-store-badge.svg" alt="Download on the App Store">
        </a>
        <a class="store-badge" href="https://play.google.com/store/apps/details?id=com.leaguemgr.league_mgr_app">
          <img src="/images/badges/google-play-badge.png" alt="Get it on Google Play">
        </a>
      </div>
    </main>
  </div>
</body>
</html>
