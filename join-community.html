<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Team — Fanager</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: #0A1628;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 440px;
      width: 90%;
      padding: 2.5rem 2rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid #1E293B;
      border-radius: 16px;
      text-align: center;
    }
    .logo { width: 48px; height: 48px; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.95rem; color: #B8C4D0; margin-bottom: 1.5rem; line-height: 1.5; }
    .stores { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .store-btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
    }
    .ios { background: #3B82F6; }
    .android { background: #0891B2; }
    .store-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/assets/icon-192.png" alt="Fanager" class="logo" />
    <h1>You've been invited to join a team</h1>
    <p>Open this link in the Fanager app to view the team and request to join. If you don't have the app yet, download it below.</p>
    <div class="stores" id="store-links"></div>
  </div>

  <script>
    // Follow the existing share.html deep-link pattern exactly:
    // 1. leaguehq://open?path=/c/CODE for custom scheme
    // 2. Android store URL with referrer=path=/c/CODE for post-install pickup
    var path = window.location.pathname; // e.g. /c/abc123

    // Build deep link using the app's existing contract
    var appOpenUrl = 'leaguehq://open?path=' + encodeURIComponent(path);

    // Build store links — Android includes referrer so install_referrer can
    // recover the join path after first launch
    var iosUrl = 'https://apps.apple.com/app/fanager-league-manager/id6759442301';
    var androidUrl =
      'https://play.google.com/store/apps/details?id=com.leaguemgr.league_mgr_app&referrer=' +
      encodeURIComponent('path=' + path);

    // Try to open the app first
    window.location.href = appOpenUrl;

    // After a short delay (app didn't open), show store links
    setTimeout(function() {
      document.getElementById('store-links').innerHTML =
        '<a href="' + iosUrl + '" class="store-btn ios">App Store</a>' +
        '<a href="' + androidUrl + '" class="store-btn android">Google Play</a>';
    }, 1500);
  </script>
</body>
</html>
