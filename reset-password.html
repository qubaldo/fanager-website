<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Reset Password — Fanager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#0A1628',
              'card-dark': '#111827',
              'border-dark': '#1F2937',
              'footer-bg': '#060d1a',
              cyan: '#06B6D4',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .btn-disabled { background-color: #6B7280 !important; cursor: not-allowed; }
        .error { color: #EF4444; }
        .success { color: #22C55E; }
    </style>
</head>
<body class="bg-navy text-white font-sans min-h-screen flex flex-col">
    <!-- Logo -->
    <div class="text-center pt-16 mb-8">
        <span class="text-cyan text-lg font-bold tracking-widest">FANAGER</span>
    </div>

    <!-- Card -->
    <div class="max-w-md mx-auto px-6 flex-1 flex items-start justify-center">
        <div class="w-full bg-card-dark border border-border-dark rounded-xl p-8 text-center">
            <!-- Lock icon -->
            <div class="w-12 h-12 bg-cyan/15 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>

            <h1 class="text-xl font-semibold mb-2">Reset Your Password</h1>

            <div id="reset-form">
                <p class="text-slate-400 text-sm mb-6">Enter your new password below</p>
                <div class="text-left mb-4">
                    <label for="password" class="block text-slate-400 text-xs uppercase tracking-wide mb-1">New Password</label>
                    <input type="password" id="password" placeholder="Enter new password" class="w-full bg-navy border border-border-dark rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-cyan">
                </div>
                <div class="text-left mb-2">
                    <label for="confirm" class="block text-slate-400 text-xs uppercase tracking-wide mb-1">Confirm Password</label>
                    <input type="password" id="confirm" placeholder="Confirm new password" class="w-full bg-navy border border-border-dark rounded-lg py-3 px-4 text-white text-sm focus:outline-none focus:border-cyan">
                </div>
                <p class="text-gray-500 text-xs text-left mb-4">Must be at least 8 characters</p>
                <p id="form-error" class="error text-sm mb-3" style="display:none;"></p>
                <button id="submit-btn" class="w-full bg-cyan hover:bg-cyan/80 text-white font-semibold py-3 px-6 rounded-lg transition-colors" onclick="resetPassword()">Reset Password</button>
            </div>

            <div id="status" style="display: none;">
                <p id="status-message" class="text-base mb-4"></p>
                <a id="open-app" href="leaguehq://login-callback" class="inline-block bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors" style="display:none;">Open Fanager</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center py-8">
        <p class="text-gray-600 text-xs">&copy; 2026 Kimusoft LLC</p>
    </div>

    <script>
        const API_URL = 'https://league-hq-api-802921464084.us-west1.run.app/league-manager';

        async function resetPassword() {
            const pw = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const errorEl = document.getElementById('form-error');
            errorEl.style.display = 'none';

            if (pw !== confirm) { showFormError('Passwords do not match.'); return; }
            if (pw.length < 8) { showFormError('Password must be at least 8 characters.'); return; }

            const btn = document.getElementById('submit-btn');
            btn.textContent = 'Resetting...';
            btn.classList.add('btn-disabled');
            btn.disabled = true;

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) { showFormError('No reset token found.'); return; }

            try {
                const resp = await fetch(API_URL + '/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, password: pw })
                });
                const data = await resp.json();
                if (resp.ok) {
                    document.getElementById('reset-form').style.display = 'none';
                    document.getElementById('status').style.display = 'block';
                    document.getElementById('status-message').textContent = 'Password reset successfully!';
                    document.getElementById('status-message').classList.add('success');
                    document.getElementById('open-app').style.display = 'inline-block';
                } else {
                    btn.textContent = 'Reset password';
                    btn.classList.remove('btn-disabled');
                    btn.disabled = false;
                    showFormError(data.message || 'Reset failed. The link may have expired.');
                }
            } catch (e) {
                btn.textContent = 'Reset password';
                btn.classList.remove('btn-disabled');
                btn.disabled = false;
                showFormError('Something went wrong. Please try again.');
            }
        }

        function showFormError(msg) {
            const el = document.getElementById('form-error');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
