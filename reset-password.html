<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — Fanager</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; background: #0A1628; color: white; }
        h1 { font-size: 24px; text-align: center; }
        .form-group { margin: 16px 0; }
        label { display: block; margin-bottom: 6px; font-size: 14px; color: #9CA3AF; }
        input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #374151; background: #1F2937; color: white; font-size: 16px; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; margin-top: 20px; }
        .btn-primary { background: #3B82F6; color: white; }
        .btn-primary:hover { background: #2563EB; }
        .btn-success { background: #22C55E; color: white; text-decoration: none; text-align: center; }
        .btn-disabled { background: #6B7280; cursor: not-allowed; }
        .hint { font-size: 12px; color: #6B7280; margin-top: 4px; }
        .message { margin: 20px 0; font-size: 16px; text-align: center; }
        .error { color: #EF4444; }
        .success { color: #22C55E; }
        #status { display: none; text-align: center; }
    </style>
</head>
<body>
    <h1>Fanager</h1>
    <div id="reset-form">
        <p class="message" style="text-align:center;">Choose a new password.</p>
        <div class="form-group">
            <label for="password">New password</label>
            <input type="password" id="password" placeholder="Enter new password" />
            <p class="hint">At least 8 characters. Avoid common passwords.</p>
        </div>
        <div class="form-group">
            <label for="confirm">Confirm password</label>
            <input type="password" id="confirm" placeholder="Confirm new password" />
        </div>
        <p id="form-error" class="error" style="display:none;text-align:center;"></p>
        <button id="submit-btn" class="btn btn-primary" onclick="resetPassword()">Reset password</button>
    </div>
    <div id="status">
        <p id="status-message" class="message"></p>
        <a id="open-app" href="leaguehq://login-callback" class="btn btn-success" style="display:none;">Open Fanager</a>
    </div>
    <script>
        const API_URL = 'https://league-hq-api-802921464084.us-west1.run.app/league-manager';

        async function resetPassword() {
            const pw = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            const errorEl = document.getElementById('form-error');
            errorEl.style.display = 'none';

            if (pw !== confirm) { showFormError('Passwords do not match.'); return; }
            if (pw.length < 8) { showFormError('Password must be at least 8 characters.'); return; }

            const btn = document.getElementById('submit-btn');
            btn.textContent = 'Resetting...';
            btn.classList.add('btn-disabled');
            btn.disabled = true;

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) { showFormError('No reset token found.'); return; }

            try {
                const resp = await fetch(API_URL + '/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, password: pw })
                });
                const data = await resp.json();
                if (resp.ok) {
                    document.getElementById('reset-form').style.display = 'none';
                    document.getElementById('status').style.display = 'block';
                    document.getElementById('status-message').textContent = 'Password reset successfully!';
                    document.getElementById('status-message').classList.add('success');
                    document.getElementById('open-app').style.display = 'inline-block';
                } else {
                    btn.textContent = 'Reset password';
                    btn.classList.remove('btn-disabled');
                    btn.disabled = false;
                    showFormError(data.message || 'Reset failed. The link may have expired.');
                }
            } catch (e) {
                btn.textContent = 'Reset password';
                btn.classList.remove('btn-disabled');
                btn.disabled = false;
                showFormError('Something went wrong. Please try again.');
            }
        }

        function showFormError(msg) {
            const el = document.getElementById('form-error');
            el.textContent = msg;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
