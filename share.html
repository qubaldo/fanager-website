<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fanager - Sports League Management</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Fanager - Sports League Management" />
  <meta property="og:description" content="Manage and follow recreational sports leagues" />
  <meta property="og:image" content="https://fanager.app/images/og-banner.png" />
  <meta property="og:url" content="https://fanager.app" />
  <meta property="og:type" content="website" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Fanager - Sports League Management" />
  <meta name="twitter:description" content="Manage and follow recreational sports leagues" />
  <meta name="twitter:image" content="https://fanager.app/images/og-banner.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A1628;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .logo { width: 80px; height: 80px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { color: #9CA3AF; font-size: 16px; margin-bottom: 32px; }
    .store-buttons { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
    .store-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #1F2937; color: #fff; text-decoration: none;
      padding: 12px 24px; border-radius: 12px; font-size: 14px;
      font-weight: 500; border: 1px solid #374151;
      transition: background 0.2s;
    }
    .store-btn:hover { background: #374151; }
    .qr-section { margin-top: 24px; }
    .qr-label { color: #6B7280; font-size: 12px; margin-bottom: 8px; }
    #qr-code { background: #fff; padding: 12px; border-radius: 8px; display: inline-block; }
    .open-app-btn {
      display: inline-block; background: #3B82F6; color: #fff;
      text-decoration: none; padding: 14px 32px; border-radius: 12px;
      font-size: 16px; font-weight: 600; margin-bottom: 24px;
      transition: background 0.2s;
    }
    .open-app-btn:hover { background: #2563EB; }
  </style>
</head>
<body>
  <div class="logo" style="background:#3B82F6;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:bold;">F</div>

  <h1>Check it out on Fanager!</h1>
  <p class="subtitle">Manage and follow recreational sports leagues</p>

  <a id="open-app" class="open-app-btn" href="#">Open in App</a>

  <div class="store-buttons">
    <a id="ios-store" class="store-btn" href="#" style="display:none;">
      Download on the App Store
    </a>
    <a id="android-store" class="store-btn" href="#" style="display:none;">
      Get it on Google Play
    </a>
  </div>

  <div class="qr-section" id="qr-section" style="display:none;">
    <p class="qr-label">Scan to download</p>
    <div id="qr-code"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script>
    (function() {
      var path = window.location.pathname;
      var fullUrl = 'https://fanager.app' + path;

      var iosStoreUrl = 'https://apps.apple.com/app/fanager/id_PLACEHOLDER';
      var androidStoreUrl = 'https://play.google.com/store/apps/details?id=com.leaguemgr.league_mgr_app&referrer=' + encodeURIComponent('path=' + path);

      document.getElementById('open-app').href = fullUrl;

      var ua = navigator.userAgent || '';
      var isIOS = /iPhone|iPad|iPod/i.test(ua);
      var isAndroid = /Android/i.test(ua);

      if (isIOS) {
        var btn = document.getElementById('ios-store');
        btn.href = iosStoreUrl;
        btn.style.display = 'inline-flex';
      } else if (isAndroid) {
        var btn = document.getElementById('android-store');
        btn.href = androidStoreUrl;
        btn.style.display = 'inline-flex';
      } else {
        var iosBtn = document.getElementById('ios-store');
        iosBtn.href = iosStoreUrl;
        iosBtn.style.display = 'inline-flex';

        var androidBtn = document.getElementById('android-store');
        androidBtn.href = androidStoreUrl;
        androidBtn.style.display = 'inline-flex';

        var qr = qrcode(0, 'M');
        qr.addData(fullUrl);
        qr.make();
        document.getElementById('qr-code').innerHTML = qr.createSvgTag(4);
        document.getElementById('qr-section').style.display = 'block';
      }

      // iOS deferred deep link
      if (isIOS) {
        var storedPath = localStorage.getItem('fanager_deferred_path');
        if (storedPath && storedPath === path) {
          localStorage.removeItem('fanager_deferred_path');
          window.location.href = 'https://fanager.app' + storedPath;
        } else {
          localStorage.setItem('fanager_deferred_path', path);
        }
      }
    })();
  </script>
</body>
</html>
