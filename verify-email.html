<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Verify Email — Fanager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              navy: '#0A1628',
              'card-dark': '#111827',
              'border-dark': '#1F2937',
              'footer-bg': '#060d1a',
              cyan: '#06B6D4',
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        .btn-disabled { background-color: #6B7280 !important; cursor: not-allowed; }
        .error { color: #EF4444; }
        .success { color: #22C55E; }
    </style>
</head>
<body class="bg-navy text-white font-sans min-h-screen flex flex-col">
    <!-- Logo -->
    <div class="text-center pt-16 mb-8">
        <span class="text-cyan text-lg font-bold tracking-widest">FANAGER</span>
    </div>

    <!-- Card -->
    <div class="max-w-md mx-auto px-6 flex-1 flex items-start justify-center">
        <div class="w-full bg-card-dark border border-border-dark rounded-xl p-8 text-center">
            <!-- Email icon -->
            <div class="w-12 h-12 bg-blue-500/15 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>

            <h1 class="text-xl font-semibold mb-2">Verify Your Email</h1>

            <div id="verify-section">
                <p class="text-slate-400 text-sm mb-6">Click the button below to verify your email address.</p>
                <button id="verify-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors" onclick="verifyEmail()">Verify my email</button>
            </div>

            <div id="status" style="display: none;">
                <p id="status-message" class="text-base mb-4"></p>
                <a id="open-app" href="leaguehq://login-callback" class="inline-block bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-6 rounded-lg transition-colors" style="display:none;">Open Fanager</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="text-center py-8">
        <p class="text-gray-600 text-xs">&copy; 2026 Kimusoft LLC</p>
    </div>

    <script>
        // TODO: Replace with actual API URL at deploy time
        const API_URL = 'https://league-hq-api-802921464084.us-west1.run.app/league-manager';

        async function verifyEmail() {
            const btn = document.getElementById('verify-btn');
            btn.textContent = 'Verifying...';
            btn.classList.add('btn-disabled');
            btn.disabled = true;

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showError('No verification token found. Please check your email link.');
                return;
            }

            try {
                const resp = await fetch(API_URL + '/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token })
                });
                const data = await resp.json();
                if (resp.ok) {
                    showSuccess('Email verified successfully!');
                } else {
                    showError(data.message || 'Verification failed. The link may have expired.');
                }
            } catch (e) {
                showError('Something went wrong. Please try again.');
            }
        }

        function showSuccess(msg) {
            document.getElementById('verify-section').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            document.getElementById('status-message').textContent = msg;
            document.getElementById('status-message').classList.add('success');
            document.getElementById('open-app').style.display = 'inline-block';
        }

        function showError(msg) {
            document.getElementById('verify-section').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            document.getElementById('status-message').textContent = msg;
            document.getElementById('status-message').classList.add('error');
        }
    </script>
</body>
</html>
